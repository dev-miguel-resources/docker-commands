version: "3.8" # opcional, autogenerado

services:
  mysql-service:
    image: mysql:8
    container_name: mysqlserver
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
        - "${MYSQL_PORT}:3306"
    networks:
      - net-bdds
    volumes:
      - data-bdd-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s
  
  postgres-server:
    image: postgres:15
    container_name: postgresdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
        - "${POSTGRES_PORT}:5432"
    networks:
      - net-bdds
    volumes:
      - data-postgres-vol:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  mongo-server:
    image: mongo:6
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    ports:
        - "${MONGO_PORT}:27017"
    networks:
      - net-bdds
    volumes:
      - data-mongo-vol:/data/db
    healthcheck:
      # test: ["CMD", "sh", "-c", "echo 'db.runCommand({ping:1}).ok' | mongosh admin -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet"]
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app-backend:
    image: node:20
    container_name: backend-app-node
    working_dir: /app
    volumes:
      - ./:/app
    command: ["npm", "run", "dev"]
    ports:
        - "3000:3000"
    networks:
      - net-bdds
    depends_on:
      mysql-service:
        condition: service_healthy
      postgres-server:
        condition: service_healthy
      mongo-server:
        condition: service_healthy

networks:
  net-bdds:
    name: net-bdds
    
volumes:
  data-bdd-mysql:
      name: data-bdd-mysql
  data-postgres-vol:
      name: data-postgres-vol
  data-mongo-vol:
      name: data-mongo-vol