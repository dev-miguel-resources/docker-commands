version: "3.8" # opcional, autogenerado

services:
  mysql-service:
    image: mysql:8
    container_name: mysqlserver
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    ports:
        - "${MYSQL_PORT}:3306"
    networks:
      - net-bdds
    volumes:
      - data-bdd-mysql:/var/lib/mysql
  
  postgres-server:
    image: postgres:15
    container_name: postgresdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
        - "${POSTGRES_PORT}:5432"
    networks:
      - net-bdds
    volumes:
      - data-postgres-vol:/var/lib/postgresql/data
  
  mongo-server:
    image: mongo:6
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    ports:
        - "${MONGO_PORT}:27017"
    networks:
      - net-bdds
    volumes:
      - data-mongo-vol:/data/db

networks:
  net-bdds:
    name: net-bdds
    
volumes:
  data-bdd-mysql:
      name: data-bdd-mysql
  data-postgres-vol:
      name: data-postgres-vol
  data-mongo-vol:
      name: data-mongo-vol