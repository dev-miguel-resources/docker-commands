services:
  mysql-service:
    image: mysql:8
    container_name: mysqldb
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_dev_root_pass
      MYSQL_USER_FILE: /run/secrets/mysql_dev_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_dev_pass
      MYSQL_DATABASE_FILE: /run/secrets/mysql_dev_db
    secrets:
      - mysql_dev_root_pass
      - mysql_dev_user
      - mysql_dev_pass
      - mysql_dev_db
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - net-bdds
    volumes:
      - data-bdd-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$(cat /run/secrets/mysql_root_pass) || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s

  postgres-service:
    image: postgres:15
    container_name: postgresdb
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_dev_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_dev_pass
      POSTGRES_DATABASE_FILE: /run/secrets/postgres_dev_db
    secrets:
      - postgres_dev_user
      - postgres_dev_pass
      - postgres_dev_db
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - net-bdds
    volumes:
      - data-postgres-vol:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/postgres_dev_user)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-service:
    image: mongo:6
    container_name: mongodb
    secrets:
      - mongo_dev_user
      - mongo_dev_pass
      - mongo_dev_db
    command: >
      sh -c "
        export MONGO_INITDB_ROOT_USERNAME=$(cat /run/secrets/mongo_dev_user) &&
        export MONGO_INITDB_ROOT_PASSWORD=$(cat /run/secrets/mongo_dev_pass) &&
        export MONGO_INITDB_DATABASE=$(cat /run/secrets/mongo_dev_db) &&
        exec docker-entrypoint.sh mongod
      "
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - net-bdds
    volumes:
      - data-mongo-vol:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app-backend:
    image: node:20
    container_name: backend-app-node
    working_dir: /app
    volumes:
      - ./:/app
    command: ["npm", "run", "dev"]
    ports:
        - "3000:3000"
    networks:
      - net-bdds
    depends_on:
      mysql-service:
        condition: service_healthy
      postgres-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy

networks:
  net-bdds:
    name: net-bdd
    
volumes:
  data-bdd-mysql:
      name: data-bdd-mysql
  data-postgres-vol:
      name: data-postgres-vol
  data-mongo-vol:
      name: data-mongo-vol

secrets:
  mysql_dev_root_pass:
    file: ./secrets/mysql_dev_root_pass.txt
  mysql_dev_user:
    file: ./secrets/mysql_dev_user.txt
  mysql_dev_pass:
    file: ./secrets/mysql_dev_pass.txt
  mysql_dev_db:
    file: ./secrets/mysql_dev_db.txt

  postgres_dev_user:
    file: ./secrets/postgres_dev_user.txt
  postgres_dev_pass:
    file: ./secrets/postgres_dev_pass.txt
  postgres_dev_db:
    file: ./secrets/postgres_dev_db.txt

  mongo_dev_user:
    file: ./secrets/mongo_dev_user.txt
  mongo_dev_pass:
    file: ./secrets/mongo_dev_pass.txt
  mongo_dev_db:
    file: ./secrets/mongo_dev_db.txt
      
  









  